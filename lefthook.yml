commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,html}"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{css,json,md}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm exec tsc --noEmit
    test:
      run: pnpm test --watch=false
